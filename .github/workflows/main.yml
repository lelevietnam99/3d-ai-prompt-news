name: Daily AI Prompt News Update

on:
  schedule:
    # Cấu hình chạy vào 6h00 sáng mỗi ngày (Giờ Việt Nam UTC+7 -> dùng 23h00 của ngày hôm trước)
    - cron: '0 23 * * *' 
  workflow_dispatch: # Thêm dòng này để xuất hiện nút "Run workflow" chạy thủ công khi cần

permissions:
  contents: write # Cấp quyền cho bot được phép ghi đè (commit) file index.html mới vào kho lưu trữ

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python Scraper & Translator
        run: python build_news.py

      - name: Commit and Push index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Câu lệnh dưới giúp kiểm tra, nếu có file HTML mới thì mới commit để tránh báo lỗi
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update AI 3D Prompt News" && git push)
